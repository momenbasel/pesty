name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (Swift 6, macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build (debug)
        run: swift build -v

      - name: Build app bundle
        run: VERSION=0.0.0 BUILD=ci ./scripts/build_app.sh
